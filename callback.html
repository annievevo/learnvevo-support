<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnVevo – Confirmation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #f0f0f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 24px; padding: 48px 40px; max-width: 400px; width: 90%; text-align: center; }
    .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #6c47ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2a2a38; border-top-color: #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 24px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; }
    p { color: #a0a0b8; font-size: 0.9rem; line-height: 1.6; }
    .success { display: none; }
    .success .icon { font-size: 3rem; margin-bottom: 16px; }
    .btn { display: inline-block; margin-top: 24px; background: linear-gradient(135deg, #6c47ff, #a855f7); color: #fff; font-weight: 700; font-size: 0.95rem; padding: 14px 28px; border-radius: 14px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LearnVevo</div>

    <div id="loading">
      <div class="spinner"></div>
      <h2>Vérification en cours…</h2>
      <p>Ouverture de l'application LearnVevo</p>
    </div>

    <div class="success" id="success">
      <div class="icon">✅</div>
      <h2>Email confirmé !</h2>
      <p>Ton compte est activé. Retourne dans l'application pour te connecter.</p>
      <a class="btn" id="openBtn" href="#">Ouvrir LearnVevo</a>
    </div>
  </div>

  <script>
    function getParams() {
      const hash = window.location.hash.substring(1);
      const query = window.location.search.substring(1);
      const params = {};
      (hash + '&' + query).split('&').forEach(function(p) {
        const parts = p.split('=');
        if (parts[0]) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
      });
      return params;
    }

    const params = getParams();
    const accessToken = params['access_token'];
    const refreshToken = params['refresh_token'];
    const type = params['type'];
    const error = params['error'];

    if (error) {
      document.getElementById('loading').innerHTML =
        '<div style="font-size:2.5rem;margin-bottom:16px">⚠️</div>' +
        '<h2>Lien expiré</h2>' +
        '<p>Ce lien de confirmation n\'est plus valide.<br>Relance l\'inscription dans l\'app.</p>';
    } else {
      // Build deep link
      let deepLink = 'learnvevo://auth/callback';
      const qs = [];
      if (accessToken) qs.push('access_token=' + encodeURIComponent(accessToken));
      if (refreshToken) qs.push('refresh_token=' + encodeURIComponent(refreshToken));
      if (type) qs.push('type=' + encodeURIComponent(type));
      if (qs.length) deepLink += '#' + qs.join('&');

      document.getElementById('openBtn').href = deepLink;

      // Try to open app immediately
      window.location.href = deepLink;

      // Show success UI after short delay
      setTimeout(function() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      }, 1500);
    }
  </script>
</body>
</html>
